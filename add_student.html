<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h3>Add Student</h3>

<form method="POST">

    <input type="text" name="name" placeholder="Enter Name" class="form-control mb-3" required>

    <select name="department" class="form-control mb-3" required>
        <option value="">Select Department</option>
        <option value="CSE">CSE</option>
        <option value="ECE">ECE</option>
        <option value="MECH">MECH</option>
    </select>

    <input type="date" name="joining_date" class="form-control mb-3" required>

    <button class="btn btn-success">Save Student</button>

</form>

</body>
</html>
